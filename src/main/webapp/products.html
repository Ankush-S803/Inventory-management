<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manage your product catalog — add, edit, delete products">
    <title>Products | Inventory Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <h1>📦 InventoryPro</h1>
            <span>Stock Management</span>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-link"><span class="icon">🏠</span> Dashboard</a>
            <a href="products.html" class="nav-link active"><span class="icon">📋</span> Products</a>
            <a href="stock.html" class="nav-link"><span class="icon">📊</span> Stock Transactions</a>
            <a href="suppliers.html" class="nav-link"><span class="icon">🏢</span> Suppliers</a>
            <a href="low-stock.html" class="nav-link"><span class="icon">🚨</span> Low Stock Alerts</a>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="main-content">

        <div class="page-header">
            <div>
                <h2>Products</h2>
                <p>Manage your product catalog</p>
            </div>
            <button class="btn btn-accent" onclick="openAddProductModal()" id="btn-add-product">
                ＋ Add Product
            </button>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <div class="search-box">
                <span class="icon">🔍</span>
                <input type="text" id="product-search" placeholder="Search by name or code..." oninput="searchProducts()">
            </div>
        </div>

        <!-- Products Table -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Total Stock</th>
                        <th>Available</th>
                        <th>Threshold</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="product-tbody">
                    <tr><td colspan="8"><div class="loader"><div class="spinner"></div></div></td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- ==================== ADD / EDIT PRODUCT MODAL ==================== -->
    <div class="modal-overlay" id="product-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="product-modal-title">Add New Product</h3>
                <button class="modal-close" onclick="closeModal('product-modal')">×</button>
            </div>
            <form id="product-form" onsubmit="saveProduct(event)">
                <div class="modal-body">
                    <input type="hidden" id="product-id">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="product-code">Product Code *</label>
                            <input type="text" id="product-code" required placeholder="e.g. PRD-001">
                        </div>
                        <div class="form-group">
                            <label for="product-name">Product Name *</label>
                            <input type="text" id="product-name" required placeholder="e.g. Wireless Mouse">
                        </div>
                        <div class="form-group">
                            <label for="product-price">Price (₹) *</label>
                            <input type="number" id="product-price" required min="0" step="0.01" placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label for="product-threshold">Low Stock Threshold</label>
                            <input type="number" id="product-threshold" min="0" value="10" placeholder="10">
                        </div>
                        <div class="form-group full-width">
                            <label for="product-description">Description</label>
                            <textarea id="product-description" placeholder="Optional product description..."></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-ghost" onclick="closeModal('product-modal')">Cancel</button>
                    <button type="submit" class="btn btn-accent" id="btn-save-product">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
