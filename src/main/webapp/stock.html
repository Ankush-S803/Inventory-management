<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Stock transactions — record stock in, stock out, and manage inventory">
    <title>Stock Transactions | Inventory Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <h1>📦 InventoryPro</h1>
            <span>Stock Management</span>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-link"><span class="icon">🏠</span> Dashboard</a>
            <a href="products.html" class="nav-link"><span class="icon">📋</span> Products</a>
            <a href="stock.html" class="nav-link active"><span class="icon">📊</span> Stock Transactions</a>
            <a href="suppliers.html" class="nav-link"><span class="icon">🏢</span> Suppliers</a>
            <a href="low-stock.html" class="nav-link"><span class="icon">🚨</span> Low Stock Alerts</a>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="main-content">

        <div class="page-header">
            <div>
                <h2>Stock Transactions</h2>
                <p>Record and manage stock movements</p>
            </div>
            <button class="btn btn-accent" onclick="openStockModal()" id="btn-new-txn">
                ＋ New Transaction
            </button>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <select id="txn-type-filter" onchange="filterTransactions()">
                <option value="">All Types</option>
                <option value="IN">Stock IN</option>
                <option value="OUT">Stock OUT</option>
            </select>
        </div>

        <!-- Transactions Table -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Reference</th>
                        <th>Product</th>
                        <th>Type</th>
                        <th>Qty</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="stock-tbody">
                    <tr><td colspan="7"><div class="loader"><div class="spinner"></div></div></td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- ==================== STOCK IN / OUT MODAL ==================== -->
    <div class="modal-overlay" id="stock-modal">
        <div class="modal">
            <div class="modal-header">
                <h3>New Stock Transaction</h3>
                <button class="modal-close" onclick="closeModal('stock-modal')">×</button>
            </div>
            <form id="stock-form">
                <div class="modal-body">
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="stock-product">Product *</label>
                            <select id="stock-product" required>
                                <option value="">Select Product</option>
                            </select>
                        </div>
                        <div class="form-group full-width">
                            <label for="stock-quantity">Quantity *</label>
                            <input type="number" id="stock-quantity" required min="1" placeholder="Enter quantity">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-ghost" onclick="closeModal('stock-modal')">Cancel</button>
                    <button type="button" class="btn btn-success" onclick="stockIn(event)" id="btn-stock-in">
                        📥 Stock IN
                    </button>
                    <button type="button" class="btn btn-warning" onclick="stockOut(event)" id="btn-stock-out">
                        📤 Stock OUT
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadStock);
    </script>
</body>
</html>
